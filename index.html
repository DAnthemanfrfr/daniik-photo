<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#080706">
<title>Daniik — Photography</title>
<meta name="description" content="Sports, portraits and events photography by @daniik_photo.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   RESET & TOKENS
═══════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#070605;
  --ink2:#0f0e0c;
  --paper:#f0ebe3;
  --gold:#c8a97e;
  --gold-lt:#dfc49a;
  --gold-dk:#9e7f58;
  --muted:#7d766d;
  --muted2:#4e4840;
  --serif:'Cormorant Garamond',serif;
  --sans:'Jost',sans-serif;
  --ease:cubic-bezier(.23,1,.32,1);
  --ease-in:cubic-bezier(.55,0,1,.45);
}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;text-size-adjust:100%}
body{font-family:var(--sans);background:var(--ink);color:var(--paper);overflow-x:hidden;-webkit-font-smoothing:antialiased}
img{display:block;max-width:100%;height:auto}
button,input,textarea,select{font-family:inherit;-webkit-appearance:none;appearance:none;border-radius:0}

/* Fix iOS blue link color */
a{color:inherit;text-decoration:none;-webkit-text-fill-color:inherit}

/* ═══════════════════════════════════════════
GRAIN TEXTURE
═══════════════════════════════════════════ */
body::before{
content:'';position:fixed;inset:0;z-index:9100;pointer-events:none;opacity:.04;
background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.88' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)'/%3E%3C/svg%3E");
background-size:180px;
}

/* ═══════════════════════════════════════════
CURSOR
═══════════════════════════════════════════ */
#cur,#cur-ring{display:none;pointer-events:none;position:fixed;z-index:9999;transform:translate(-50%,-50%)}
@media(pointer:fine){
body{cursor:none}
#cur{display:block;width:7px;height:7px;background:var(--gold);border-radius:50%;transition:width .18s,height .18s,opacity .2s;z-index:9999}
#cur-ring{display:block;width:30px;height:30px;border:1px solid rgba(200,169,126,.42);border-radius:50%;z-index:9998;transition:width .38s var(--ease),height .38s var(--ease),border-color .3s,opacity .3s}
body.ch #cur{width:4px;height:4px}
body.ch #cur-ring{width:48px;height:48px;border-color:rgba(200,169,126,.72)}
a,button,.copt,.thumb{cursor:none}
}

/* ═══════════════════════════════════════════
LOADER
═══════════════════════════════════════════ */
#ldr{
position:fixed;inset:0;z-index:8500;background:var(--ink);
display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2rem;
transition:opacity .8s var(--ease),visibility .8s;
}
#ldr.out{opacity:0;visibility:hidden;pointer-events:none}
.ldr-logo{font-family:var(--serif);font-size:clamp(1.8rem,6vw,2.8rem);letter-spacing:.18em;font-weight:300;color:var(--paper);-webkit-text-fill-color:var(--paper)}
.ldr-logo em{font-style:italic;color:var(--gold);-webkit-text-fill-color:var(--gold)}
.ldr-line{width:80px;height:1px;background:rgba(200,169,126,.12);overflow:hidden}
.ldr-fill{height:100%;background:linear-gradient(90deg,var(--gold-dk),var(--gold-lt));animation:ldrSlide 1.5s var(--ease) forwards}
@keyframes ldrSlide{from{transform:scaleX(0);transform-origin:left}to{transform:scaleX(1);transform-origin:left}}

/* ═══════════════════════════════════════════
NAV
═══════════════════════════════════════════ */
nav{
position:fixed;top:0;left:0;right:0;z-index:700;
display:flex;justify-content:space-between;align-items:center;
padding:env(safe-area-inset-top,0) 0 0;
transition:background .5s,border-color .5s;
border-bottom:1px solid transparent;
}
.nav-inner{width:100%;display:flex;justify-content:space-between;align-items:center;padding:1.3rem 1.25rem}
nav.scrolled{background:rgba(7,6,5,.93);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-color:rgba(200,169,126,.1)}
nav.scrolled .nav-inner{padding:.9rem 1.25rem}

.logo{font-family:var(--serif);font-size:1.35rem;letter-spacing:.14em;font-weight:300;color:var(--paper) !important;-webkit-text-fill-color:var(--paper) !important;text-decoration:none;display:inline-block}
.logo em{font-style

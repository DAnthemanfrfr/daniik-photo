<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#080706">
<title>Daniik — Photography</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   RESET & TOKENS (Fixed syntax from – to --)
═══════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#070605;
  --paper:#f0ebe3;
  --gold:#c8a97e;
  --gold-dk:#9e7f58;
  --muted:#7d766d;
  --serif:'Cormorant Garamond',serif;
  --sans:'Jost',sans-serif;
  --ease:cubic-bezier(.23,1,.32,1);
}

/* FIX: Force remove blue/purple links on iOS/Safari */
a, a:visited, a:hover, a:active {
  color: inherit !important;
  text-decoration: none;
  -webkit-text-fill-color: currentColor !important;
}

body {
  background: var(--ink);
  color: var(--paper);
  font-family: var(--sans);
  overflow-x: hidden;
  cursor: none; /* Hide default for custom cursor */
}

/* ═══════════════════════════════════════════
   SICK ANIMATIONS & REVEALS
═══════════════════════════════════════════ */
.reveal {
  opacity: 0;
  transform: translateY(40px);
  transition: all 1s var(--ease);
}
.reveal.visible {
  opacity: 1;
  transform: translateY(0);
}

/* ═══════════════════════════════════════════
   CUSTOM CURSOR
═══════════════════════════════════════════ */
#cur {
  width: 8px; height: 8px; background: var(--gold);
  border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999;
}
#cur-ring {
  width: 35px; height: 35px; border: 1px solid var(--gold);
  border-radius: 50%; position: fixed; pointer-events: none; z-index: 9998;
  transition: width 0.3s, height 0.3s, transform 0.1s;
}

/* ═══════════════════════════════════════════
   NAV
═══════════════════════════════════════════ */
nav {
  position: fixed; top: 0; width: 100%; z-index: 1000;
  padding: 1.5rem 2rem; display: flex; justify-content: space-between; align-items: center;
  mix-blend-mode: difference;
}
.logo {
  font-family: var(--serif); font-size: 1.5rem; letter-spacing: 0.1em;
}
.logo em { color: var(--gold); font-style: italic; }

/* ═══════════════════════════════════════════
   HERO SECTION
═══════════════════════════════════════════ */
.hero {
  height: 100vh; display: flex; align-items: flex-end; padding: 5rem 3rem;
  position: relative; overflow: hidden;
}
.hero-photo {
  position: absolute; inset: 0; z-index: -1;
}
.hero-photo img {
  width: 100%; height: 100%; object-fit: cover;
  filter: brightness(0.5); transform: scale(1.1);
  animation: heroZoom 10s infinite alternate linear;
}
@keyframes heroZoom { to { transform: scale(1); } }

.hero-title {
  font-family: var(--serif); font-size: clamp(3rem, 10vw, 7rem);
  line-height: 0.9; font-weight: 300;
}
.hero-title em { color: var(--gold); font-style: italic; }

/* ═══════════════════════════════════════════
   PRECISION SLIDER
═══════════════════════════════════════════ */
.slider-section { height: 90vh; background: #000; position: relative; overflow: hidden; }
.slider-track { display: flex; height: 100%; transition: transform 0.8s var(--ease); }
.slide { flex: 0 0 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
.slide img { max-height: 80vh; max-width: 90%; object-fit: contain; }

/* ═══════════════════════════════════════════
   PRICING CALCULATOR
═══════════════════════════════════════════ */
.calc-option {
  padding: 1rem; border: 1px solid rgba(200,169,126,0.3);
  margin-bottom: 0.5rem; transition: 0.3s;
}
.calc-option.active {
  background: var(--gold); color: var(--ink);
}
</style>
</head>
<body>

<div id="cur"></div>
<div id="cur-ring"></div>

<nav>
  <a href="#" class="logo">Dan<em>iik</em></a>
  <div style="display:flex; gap: 2rem;">
    <a href="#work">Work</a>
    <a href="#booking" style="color: var(--gold) !important;">Book Now</a>
  </div>
</nav>

<section class="hero">
  <div class="hero-photo">
    <img src="images/IMG_4556.jpg" alt="Hero">
  </div>
  <div class="reveal">
    <p style="color: var(--gold); letter-spacing: 0.3em; font-size: 0.7rem; text-transform: uppercase;">Based in London</p>
    <h1 class="hero-title">Capturing<br>Moments That<br><em>Breathe</em></h1>
  </div>
</section>

<section class="slider-section" id="work">
  <div class="slider-track" id="sliderTrack">
    </div>
</section>

<section id="booking" style="padding: 10rem 3rem;">
  <div class="reveal">
    <h2 style="font-family: var(--serif); font-size: 3rem; margin-bottom: 2rem;">Let's <em>Connect</em></h2>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 4rem;">
      <div>
        <p style="color: var(--gold); text-transform: uppercase; font-size: 0.6rem; margin-bottom: 1rem;">Select Service</p>
        <div class="calc-option active">Sports Photography</div>
        <div class="calc-option">Editorial Portraits</div>
        <div class="calc-option">Social Events</div>
      </div>
      
      <form action="https://formspree.io/f/mlgalbve" method="POST">
        <input type="text" placeholder="Your Name" style="width:100%; background:transparent; border:none; border-bottom:1px solid var(--gold); color:white; padding: 1rem 0; margin-bottom: 2rem;">
        <button type="submit" style="background: var(--gold); border:none; padding: 1rem 3rem; font-family: var(--sans); text-transform: uppercase; letter-spacing: 0.2em; font-size: 0.7rem;">Send Inquiry</button>
      </form>
    </div>
  </div>
</section>

<script>
  // 1. FIXED CURSOR
  const cur = document.getElementById('cur');
  const ring = document.getElementById('cur-ring');
  document.addEventListener('mousemove', (e) => {
    cur.style.left = e.clientX + 'px';
    cur.style.top = e.clientY + 'px';
    setTimeout(() => {
      ring.style.left = e.clientX + 'px';
      ring.style.top = e.clientY + 'px';
    }, 50);
  });

  // 2. REVEAL ANIMATION (Sick Scroll Effect)
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) entry.target.classList.add('visible');
    });
  }, { threshold: 0.2 });
  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

  // 3. SHUFFLE AND INJECT PHOTOS
  const photos = [
    "images/IMG_4529.jpg", "images/IMG_4650.jpg", "images/IMG_4668.jpg", "images/IMG_4728.jpg",
    "images/IMG_4853.jpg", "images/IMG_4860.jpg", "images/IMG_5411.jpg", "images/IMG_5415.jpg",
    "images/IMG_5418.jpg", "images/IMG_5439.jpg", "images/IMG_5479.jpg", "images/IMG_5485.jpg",
    "images/IMG_5515.jpg", "images/IMG_5583.jpg", "images/IMG_5595.jpg", "images/IMG_5623.jpg",
    "images/IMG_5668.jpg", "images/IMG_5747.jpg", "images/IMG_5748.jpg", "images/IMG_5831.jpg",
    "images/IMG_5864.jpg", "images/IMG_5897.jpg", "images/IMG_6032.jpg", "images/IMG_6040.jpg"
  ];

  const track = document.getElementById('sliderTrack');
  const selected = photos.sort(() => 0.5 - Math.random()).slice(0, 15);
  
  selected.forEach(src => {
    const slide = document.createElement('div');
    slide.className = 'slide';
    slide.innerHTML = `<img src="${src}">`;
    track.appendChild(slide);
  });

  // 4. AUTO SLIDE
  let index = 0;
  setInterval(() => {
    index = (index + 1) % 15;
    track.style.transform = `translateX(-${index * 100}%)`;
  }, 4000);
</script>
</body>
</html>

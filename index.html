<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniik — Photography</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  /* CSS STYLES */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #0e0d0c; --paper: #f5f1eb; --warm: #c8a97e;
    --muted: #8a8077; --serif: 'Cormorant Garamond', serif; --sans: 'Jost', sans-serif;
  }
  html { scroll-behavior: smooth; }
  body { font-family: var(--sans); background: var(--ink); color: var(--paper); overflow-x: hidden; cursor: none; }

  .cursor { position: fixed; width: 10px; height: 10px; background: var(--warm); border-radius: 50%; pointer-events: none; z-index: 9999; transition: transform 0.15s ease; transform: translate(-50%,-50%); }
  .cursor-ring { position: fixed; width: 36px; height: 36px; border: 1px solid rgba(200,169,126,0.5); border-radius: 50%; pointer-events: none; z-index: 9998; transform: translate(-50%,-50%); }

  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 1.8rem 3rem; display: flex; justify-content: space-between; align-items: center; mix-blend-mode: difference; }
  .logo { font-family: var(--serif); font-size: 1.3rem; letter-spacing: 0.12em; font-weight: 300; color: var(--paper); text-decoration: none; }
  .logo em { font-style: italic; color: var(--warm); }
  .nav-links { display: flex; gap: 2.5rem; list-style: none; align-items: center; }
  .nav-links a { font-family: var(--sans); font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 300; color: var(--paper); text-decoration: none; opacity: 0.7; }
  .nav-book { opacity: 1 !important; color: var(--warm) !important; border: 1px solid rgba(200,169,126,0.4); padding: 0.5rem 1.2rem !important; }

  .hero { min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr; position: relative; }
  .hero-left { display: flex; flex-direction: column; justify-content: flex-end; padding: 8rem 3rem 5rem; }
  .hero-title { font-family: var(--serif); font-size: clamp(3.5rem, 6vw, 6rem); font-weight: 300; line-height: 1.05; margin-bottom: 2rem; }
  .hero-title em { font-style: italic; color: var(--warm); }
  .hero-img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.75); }

  .marquee-wrap { border-top: 1px solid rgba(200,169,126,0.2); border-bottom: 1px solid rgba(200,169,126,0.2); overflow: hidden; padding: 1rem 0; }
  .marquee-track { display: flex; gap: 4rem; white-space: nowrap; animation: marquee 20s linear infinite; }
  @keyframes marquee { from { transform:translateX(0); } to { transform:translateX(-50%); } }

  .gallery-grid { display: grid; grid-template-columns: repeat(12, 1fr); grid-auto-rows: 80px; gap: 8px; padding: 0 3rem; }
  .gallery-item { overflow: hidden; position: relative; background: #1a1a1a; }
  .gallery-item:nth-child(1) { grid-column: 1/6; grid-row: 1/6; }
  .gallery-item:nth-child(2) { grid-column: 6/9; grid-row: 1/4; }
  .gallery-item:nth-child(3) { grid-column: 9/13; grid-row: 1/5; }
  .gallery-item img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%); transition: 0.7s; }
  .gallery-item:hover img { filter: grayscale(0%); transform: scale(1.05); }

  .reveal { opacity:0; transform:translateY(30px); transition: 0.9s ease-out; }
  .reveal.visible { opacity:1; transform:translateY(0); }
  
  .bform { margin-top: 2rem; display: flex; flex-direction: column; gap: 1rem; max-width: 400px; }
  .fg input { background: transparent; border: none; border-bottom: 1px solid var(--warm); color: white; padding: 10px; width: 100%; outline: none; }
  .bsubmit { background: var(--warm); color: var(--ink); border: none; padding: 15px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<nav>
  <a href="#" class="logo">Dan<em>iik</em></a>
  <ul class="nav-links">
    <li><a href="#work">Work</a></li>
    <li><a href="#booking" class="nav-book">Book a Session</a></li>
  </ul>
</nav>

<section class="hero">
  <div class="hero-left">
    <h1 class="hero-title">Capturing<br>moments<br>that <em>breathe</em></h1>
    <a href="#work" style="color: var(--warm); text-decoration: none; letter-spacing: 2px;">VIEW PORTFOLIO →</a>
  </div>
  <div class="hero-right">
    <img class="hero-img" src="https://images.unsplash.com/photo-1614850523296-d8c1af93d400?w=900&q=80" alt="Hero">
  </div>
</section>

<div class="marquee-wrap">
  <div class="marquee-track">
    <span style="font-family: var(--serif); font-style: italic;">PORTRAIT ✦ EDITORIAL ✦ LANDSCAPE ✦ FINE ART ✦ ARCHITECTURE ✦ DOCUMENTARY ✦ PORTRAIT ✦ EDITORIAL ✦</span>
  </div>
</div>

<section class="gallery-section" id="work" style="padding: 5rem 0;">
  <div class="gallery-grid">
    <div class="gallery-item reveal"><img src="https://images.unsplash.com/photo-1470770903676-69b98201ea1c?w=700" alt=""></div>
    <div class="gallery-item reveal"><img src="https://images.unsplash.com/photo-1533090161767-e6ffed986c88?w=500" alt=""></div>
    <div class="gallery-item reveal"><img src="https://images.unsplash.com/photo-1516912481808-3406841bd33c?w=600" alt=""></div>
  </div>
</section>

<section id="booking" style="padding: 5rem 3rem;">
  <h2 style="font-family: var(--serif); font-size: 3rem;">Book a <em>Session</em></h2>
  <div class="bform" id="bform">
    <div class="fg"><input type="text" placeholder="Full Name"></div>
    <div class="fg"><input type="email" placeholder="Email Address"></div>
    <button class="bsubmit" onclick="alert('Request Sent!')">Send Request</button>
  </div>
</section>

<script>
  // JAVASCRIPT LOGIC
  const cursor = document.getElementById('cursor');
  const ring = document.getElementById('cursorRing');
  let mx = 0, my = 0, rx = 0, ry = 0;

  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    cursor.style.left = mx + 'px'; cursor.style.top = my + 'px';
  });

  function anim() {
    rx += (mx - rx) * 0.12; ry += (my - ry) * 0.12;
    ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
    requestAnimationFrame(anim);
  }
  anim();

  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.1 });
  document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
</script>

</body>
</html>

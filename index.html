<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#080706">
<title>Daniik — Photography</title>
<meta name="description" content="Sports, portraits and events photography by @daniik_photo.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   RESET & TOKENS
═══════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#070605;
  --ink2:#0f0e0c;
  --paper:#f0ebe3;
  --gold:#c8a97e;
  --gold-lt:#dfc49a;
  --gold-dk:#9e7f58;
  --muted:#7d766d;
  --muted2:#4e4840;
  --serif:'Cormorant Garamond',serif;
  --sans:'Jost',sans-serif;
  --ease:cubic-bezier(.23,1,.32,1);
}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:var(--sans);background:var(--ink);color:var(--paper);overflow-x:hidden;-webkit-font-smoothing:antialiased}
img{display:block;max-width:100%;height:auto}
a{color:inherit;text-decoration:none}

/* ═══════════════════════════════════════════
   LOADER (Synchronized)
═══════════════════════════════════════════ */
#ldr{
  position:fixed;inset:0;z-index:8500;background:var(--ink);
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2rem;
  transition:opacity .6s var(--ease),visibility .6s;
}
#ldr.out{opacity:0;visibility:hidden;pointer-events:none}
.ldr-logo{font-family:var(--serif);font-size:2.8rem;letter-spacing:.18em;font-weight:300}
.ldr-logo em{font-style:italic;color:var(--gold)}
.ldr-line{width:120px;height:1px;background:rgba(200,169,126,.12);overflow:hidden;position:relative}
.ldr-fill{
  position:absolute;inset:0;background:var(--gold);
  transform:scaleX(0);transform-origin:left;
  /* This animation makes the bar move slowly at first, simulating loading */
  animation:ldrSlide 4s cubic-bezier(0.1, 0.5, 0.1, 1) forwards;
}
@keyframes ldrSlide{from{transform:scaleX(0)}to{transform:scaleX(0.95)}}

/* ═══════════════════════════════════════════
   GRAIN & CURSOR
═══════════════════════════════════════════ */
body::before{
  content:'';position:fixed;inset:0;z-index:9100;pointer-events:none;opacity:.04;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.88' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)'/%3E%3C/svg%3E");
  background-size:180px;
}
#cur,#cur-ring{display:none;pointer-events:none;position:fixed;z-index:9999;transform:translate(-50%,-50%)}
@media(pointer:fine){
  body{cursor:none}
  #cur{display:block;width:7px;height:7px;background:var(--gold);border-radius:50%;z-index:9999}
  #cur-ring{display:block;width:30px;height:30px;border:1px solid rgba(200,169,126,.4);border-radius:50%;z-index:9998;transition:width .3s,height .3s}
  a,button,.copt,.thumb{cursor:none}
}

/* ═══════════════════════════════════════════
   NAV
═══════════════════════════════════════════ */
nav{position:fixed;top:0;left:0;right:0;z-index:700;transition:background .5s}
.nav-inner{display:flex;justify-content:space-between;align-items:center;padding:1.5rem 2rem}
nav.scrolled{background:rgba(7,6,5,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(200,169,126,.1)}
.logo{font-family:var(--serif);font-size:1.35rem;letter-spacing:.14em;font-weight:300}
.logo em{font-style:italic;color:var(--gold)}
.nav-links-d{display:none;gap:2rem;list-style:none}
.nav-links-d a{font-size:.6rem;letter-spacing:.22em;text-transform:uppercase;opacity:.5;transition:opacity .3s}
.nav-links-d a:hover{opacity:1}
@media(min-width:768px){.nav-links-d{display:flex}}

/* ═══════════════════════════════════════════
   HERO (Split)
═══════════════════════════════════════════ */
.hero{position:relative;min-height:100vh;display:flex;flex-direction:column;overflow:hidden}
.hero-photo{position:relative;flex:1;z-index:1;overflow:hidden}
.hero-photo img{width:100%;height:100%;object-fit:cover;filter:brightness(.6);animation:heroZoom 10s linear infinite alternate}
@keyframes heroZoom{from{transform:scale(1)}to{transform:scale(1.1)}}
.hero-content{position:relative;z-index:3;padding:4rem 2rem;margin-top:auto}
.hero-title{font-family:var(--serif);font-size:clamp(3rem,10vw,6rem);font-weight:300;line-height:.95}
.hero-title em{font-style:italic;color:var(--gold)}

@media(min-width:768px){
  .hero{flex-direction:row}
  .hero-photo{flex:0 0 46%}
  .hero-content{flex:1;display:flex;flex-direction:column;justify-content:center;padding:0 4rem}
}

/* ═══════════════════════════════════════════
   GALLERY
═══════════════════════════════════════════ */
.gal{position:relative;background:var(--ink);overflow:hidden;padding:2rem 0}
.gal-header{padding:0 2rem 2rem;display:flex;justify-content:space-between;align-items:flex-end}
.gal-label{font-size:.6rem;letter-spacing:.3em;text-transform:uppercase;color:var(--gold)}
.gal-track{display:flex;height:70vh;transition:transform .9s var(--ease)}
.gal-slide{flex:0 0 100%;overflow:hidden;padding:0 2rem}
.gal-slide img{width:100%;height:100%;object-fit:cover;transition:transform .9s var(--ease)}
.gal-arrows{position:absolute;bottom:4rem;right:4rem;display:flex;gap:1rem;z-index:10}
.arr{width:50px;height:50px;border-radius:50%;border:1px solid var(--gold);background:rgba(7,6,5,.5);color:var(--gold);display:flex;align-items:center;justify-content:center;transition:all .3s}
.arr:hover{background:var(--gold);color:var(--ink)}

.reveal{opacity:0;transform:translateY(30px);transition:all .8s var(--ease)}
.reveal.visible{opacity:1;transform:translateY(0)}
</style>
</head>
<body>

<div id="ldr">
  <div class="ldr-logo">Dan<em>iik</em></div>
  <div class="ldr-line"><div class="ldr-fill"></div></div>
</div>

<div id="cur"></div><div id="cur-ring"></div>

<nav id="nav">
  <div class="nav-inner">
    <a href="#" class="logo">Dan<em>iik</em></a>
    <ul class="nav-links-d">
      <li><a href="#work">Work</a></li>
      <li><a href="#about">About</a></li>
      <li><a href="#booking">Booking</a></li>
    </ul>
  </div>
</nav>

<section class="hero">
  <div class="hero-photo">
    <img src="images/IMG_4556.jpg" alt="Hero">
  </div>
  <div class="hero-content">
    <h1 class="hero-title reveal">Capturing<br>moments<br>that <em>breathe</em></h1>
  </div>
</section>

<section class="gal" id="work">
  <div class="gal-header">
    <p class="gal-label">Portfolio</p>
  </div>
  <div class="gal-track" id="galTrack"></div>
  <div class="gal-arrows">
    <button class="arr" id="prevBtn">←</button>
    <button class="arr" id="nextBtn">→</button>
  </div>
</section>

<script>
/* ── IMAGE LIST ── */
const IMGS = [
  "images/IMG_4529.jpg","images/IMG_4650.jpg","images/IMG_4668.jpg","images/IMG_4728.jpg",
  "images/IMG_4853.jpg","images/IMG_4860.jpg","images/IMG_5411.jpg","images/IMG_5415.jpg",
  "images/IMG_5418.jpg","images/IMG_5439.jpg","images/IMG_5479.jpg","images/IMG_5485.jpg",
  "images/IMG_5515.jpg","images/IMG_5583.jpg","images/IMG_5595.jpg","images/IMG_5623.jpg",
  "images/IMG_5668.jpg","images/IMG_5747.jpg","images/IMG_5748.jpg","images/IMG_5831.jpg",
  "images/IMG_5864.jpg","images/IMG_5897.jpg","images/IMG_6032.jpg","images/IMG_6040.jpg"
];

/* ── SHUFFLE LOGIC ── */
const shuffle = a => { 
  const b = [...a]; 
  for(let i = b.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [b[i], b[j]] = [b[j], b[i]];
  } 
  return b; 
};

// SHUFFLE & INJECT
const galleryImages = shuffle(IMGS).slice(0, 15);
const $track = document.getElementById('galTrack');

galleryImages.forEach(src => {
  const slide = document.createElement('div');
  slide.className = 'gal-slide';
  slide.innerHTML = `<img src="${src}" alt="Daniik Photo">`;
  $track.appendChild(slide);
});

/* ── SYNCHRONIZED LOADER ── */
window.addEventListener('load', () => {
  const ldr = document.getElementById('ldr');
  const fill = ldr.querySelector('.ldr-fill');
  
  // Force bar to 100% immediately upon actual site load
  fill.style.animation = 'none';
  fill.style.transform = 'scaleX(1)';
  fill.style.transition = 'transform 0.3s ease-out';
  
  // Fade out loader after a tiny buffer so the "Full" bar is seen
  setTimeout(() => {
    ldr.classList.add('out');
  }, 400);
});

/* ── CURSOR ── */
const $cur = document.getElementById('cur'), $ring = document.getElementById('cur-ring');
if(window.matchMedia('(pointer:fine)').matches){
  document.addEventListener('mousemove', e => {
    $cur.style.left = e.clientX + 'px'; $cur.style.top = e.clientY + 'px';
    $ring.style.left = e.clientX + 'px'; $ring.style.top = e.clientY + 'px';
  });
}

/* ── GALLERY NAVIGATION ── */
let idx = 0;
const slides = document.querySelectorAll('.gal-slide');
function updateGal() { $track.style.transform = `translateX(-${idx * 100}%)`; }

document.getElementById('nextBtn').addEventListener('click', () => {
  idx = (idx + 1) % slides.length;
  updateGal();
});
document.getElementById('prevBtn').addEventListener('click', () => {
  idx = (idx - 1 + slides.length) % slides.length;
  updateGal();
});

/* ── SCROLL REVEAL ── */
const obs = new IntersectionObserver(entries => {
  entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible') });
}, {threshold: 0.1});
document.querySelectorAll('.reveal').forEach(el => obs.observe(el));

window.addEventListener('scroll', () => {
  document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 50);
});
</script>

</body>
</html>

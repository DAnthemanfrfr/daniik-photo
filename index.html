<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniik — Photography</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #0e0d0c; --paper: #f5f1eb; --warm: #c8a97e;
    --muted: #8a8077; --serif: 'Cormorant Garamond', serif; --sans: 'Jost', sans-serif;
  }
  html { scroll-behavior: smooth; }
  body { font-family: var(--sans); background: var(--ink); color: var(--paper); overflow-x: hidden; cursor: none; }

  /* Custom Cursor */
  .cursor { position: fixed; width: 10px; height: 10px; background: var(--warm); border-radius: 50%; pointer-events: none; z-index: 9999; transition: transform 0.15s ease; transform: translate(-50%,-50%); }
  .cursor-ring { position: fixed; width: 36px; height: 36px; border: 1px solid rgba(200,169,126,0.5); border-radius: 50%; pointer-events: none; z-index: 9998; transform: translate(-50%,-50%); transition: width 0.3s, height 0.3s; }

  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 1.8rem 3rem; display: flex; justify-content: space-between; align-items: center; mix-blend-mode: difference; }
  .logo { font-family: var(--serif); font-size: 1.3rem; letter-spacing: 0.12em; color: var(--paper); text-decoration: none; }
  .logo em { font-style: italic; color: var(--warm); }
  .nav-links { display: flex; gap: 2.5rem; list-style: none; align-items: center; }
  .nav-links a { font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--paper); text-decoration: none; opacity: 0.7; }

  /* Hero */
  .hero { min-height: 100vh; display: grid; grid-template-columns: 1.2fr 0.8fr; position: relative; overflow: hidden; }
  .hero-left { display: flex; flex-direction: column; justify-content: flex-end; padding: 8rem 3rem 5rem; z-index: 2; }
  .hero-title { font-family: var(--serif); font-size: clamp(3.5rem, 6vw, 6rem); font-weight: 300; line-height: 1.05; margin-bottom: 2rem; }
  .hero-title em { font-style: italic; color: var(--warm); }
  .hero-right { position: relative; width: 100%; height: 100vh; }
  .hero-img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.8); }

  /* Slider Section */
  .slider-section { height: 90vh; background: #000; position: relative; overflow: hidden; }
  .slider-track { display: flex; width: 100%; height: 100%; transition: transform 0.8s cubic-bezier(0.77, 0, 0.175, 1); will-change: transform; }
  .slide { flex: 0 0 100%; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: #000; }
  .slide img { max-width: 90vw; max-height: 80vh; object-fit: contain; pointer-events: none; user-select: none; }
  
  .slider-nav { position: absolute; width: 100%; top: 50%; left: 0; transform: translateY(-50%); display: flex; justify-content: space-between; padding: 0 3rem; pointer-events: none; z-index: 100; }
  .s-btn { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid var(--warm); color: var(--warm); width: 60px; height: 60px; border-radius: 50%; pointer-events: auto; cursor: none; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; transition: 0.3s; }
  .s-btn:hover { background: var(--warm); color: var(--ink); }

  /* Booking UI */
  .booking-section { padding: 8rem 3rem; border-top: 1px solid rgba(200,169,126,0.12); }
  .price-calc-wrap { background: rgba(200,169,126,0.03); border: 1px solid rgba(200,169,126,0.1); padding: 3rem; display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; }
  .selector-group { display: flex; flex-direction: column; gap: 1.5rem; }
  .selector-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; color: var(--warm); margin-bottom: 0.5rem; display: block;}
  .option-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .calc-option { padding: 1rem; border: 1px solid rgba(200,169,126,0.2); font-size: 0.8rem; transition: 0.3s; cursor: none; text-align: center; }
  .calc-option.active { border-color: var(--warm); background: rgba(200,169,126,0.1); color: var(--warm); }
  .est-price-box { border-left: 1px solid rgba(200,169,126,0.1); padding-left: 3rem; display: flex; flex-direction: column; justify-content: center; align-items: center; }
  .est-value { font-family: var(--serif); font-size: 5rem; line-height: 1; }
  .fg input, .fg textarea { background: transparent; border: none; border-bottom: 1px solid rgba(200,169,126,0.25); color: var(--paper); padding: 0.75rem 0; outline: none; width: 100%; font-family: var(--sans); }
  .bsubmit { background: var(--warm); color: var(--ink); border: none; padding: 1.2rem; cursor: none; text-transform: uppercase; letter-spacing: 0.2em; font-size: 0.7rem; width: 100%; transition: 0.3s; margin-top: 2rem; }
  .reveal { opacity:0; transform:translateY(30px); transition: 0.9s ease-out; }
  .reveal.visible { opacity:1; transform:translateY(0); }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<nav>
  <a href="#" class="logo">Dan<em>iik</em></a>
  <ul class="nav-links">
    <li><a href="#work">Work</a></li>
    <li><a href="#booking" style="color: var(--warm); border: 1px solid var(--warm); padding: 0.5rem 1rem;">Book Session</a></li>
  </ul>
</nav>

<section class="hero">
  <div class="hero-left">
    <h1 class="hero-title">Capturing<br>moments<br>that <em>breathe</em></h1>
    <p style="color: var(--muted); letter-spacing: 2px; font-size: 0.7rem; text-transform: uppercase;">Fine Art & Editorial Photography</p>
  </div>
  <div class="hero-right">
    <img class="hero-img" src="images/IMG_4556.jpg" alt="Daniik Hero">
  </div>
</section>

<section class="slider-section" id="work">
  <div class="slider-nav">
    <button class="s-btn" id="prevBtn">‹</button>
    <button class="s-btn" id="nextBtn">›</button>
  </div>
  <div class="slider-track" id="sliderTrack"></div>
</section>

<section class="booking-section" id="booking">
  <div class="price-calc-wrap reveal">
    <div class="selector
